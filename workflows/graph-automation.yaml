name: Entra ID User Automation

on:
  workflow_dispatch: # Allows you to trigger this manually from the Actions tab

permissions:
  id-token: write # Required to generate the OIDC token
  contents: read # Required to checkout the repository code

jobs:
  create-user:
    runs-on: windows-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Azure Login via OIDC
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          allow-no-subscriptions: true
          enable-AzPSSession: true # Sets up the PowerShell environment

      - name: Execute User Creation Script
        shell: pwsh
        run: ./script/create_user.ps1
